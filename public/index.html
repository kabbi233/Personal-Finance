<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash Flow Planner</title>
  <script src="https://cdn.teller.io/connect/connect.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1a; color: #e2e8f0; font-family: 'DM Mono', 'Courier New', monospace; }
    input:focus, select:focus { border-color: rgba(99,179,237,0.5) !important; box-shadow: 0 0 0 2px rgba(99,179,237,0.1); outline: none; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    select option { background: #1e293b; color: #e2e8f0; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TELLER_APP_ID = "app_pq1oddda2fceiqaqk6000";
const BACKEND_URL   = "";

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const today = new Date();
const CM = today.getMonth();
const CY = today.getFullYear();

function pad(n){ return String(n).padStart(2,"0"); }
function startOfMonth(offset=0){
  const d = new Date(CY, CM+offset, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;
}
function getMonths(n){
  return Array.from({length:n},(_,i)=>{
    const d = new Date(CY,CM+i,1);
    return {label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,month:d.getMonth(),year:d.getFullYear()};
  });
}
function amtForMonth(item,month,year){
  const start = new Date(item.startDate);
  if(start.getFullYear()>year||(start.getFullYear()===year&&start.getMonth()>month)) return 0;
  if(item.frequency==="once") return start.getMonth()===month&&start.getFullYear()===year?item.amount:0;
  if(item.frequency==="weekly") return item.amount*4.33;
  if(item.frequency==="biweekly") return item.amount*2.17;
  return item.amount;
}
function fmt(n){ return "$"+Math.round(Math.abs(n)).toLocaleString(); }

const CAT_IN  = ["Ivory Maids","Detailing","AI/Reactivation","W-2 Job","Other Income"];
const CAT_OUT = ["Supplies","Marketing","Software","Rent/Utilities","Personal","Taxes","Payroll","Other Expense"];
const FREQ    = {once:"One-time",weekly:"Weekly",biweekly:"Biweekly",monthly:"Monthly"};

const IS = {
  background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
  borderRadius:8,color:"#e2e8f0",padding:"7px 10px",fontSize:13,
  width:"100%",fontFamily:"inherit"
};
const SS = {...IS, cursor:"pointer"};

let NID = 30;

const defaultIncome = [
  {id:1,label:"Ivory Maids Revenue",category:"Ivory Maids",amount:3200,frequency:"monthly",startDate:startOfMonth()},
  {id:2,label:"W-2 Paycheck",category:"W-2 Job",amount:800,frequency:"biweekly",startDate:startOfMonth()},
];
const defaultExpenses = [
  {id:1,label:"Cleaning Supplies",category:"Supplies",amount:280,frequency:"monthly",startDate:startOfMonth()},
  {id:2,label:"Google Ads",category:"Marketing",amount:350,frequency:"monthly",startDate:startOfMonth()},
];

function ItemRow({item,onUpdate,onDelete,cats}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 140px 110px 120px 140px 34px",gap:8,alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
      <input value={item.label} onChange={e=>onUpdate({...item,label:e.target.value})} placeholder="Description" style={IS}/>
      <select value={item.category} onChange={e=>onUpdate({...item,category:e.target.value})} style={SS}>
        {cats.map(c=><option key={c}>{c}</option>)}
      </select>
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",fontSize:13,pointerEvents:"none"}}>$</span>
        <input type="number" value={item.amount} onChange={e=>onUpdate({...item,amount:parseFloat(e.target.value)||0})} style={{...IS,paddingLeft:22}}/>
      </div>
      <select value={item.frequency} onChange={e=>onUpdate({...item,frequency:e.target.value})} style={SS}>
        {Object.entries(FREQ).map(([k,v])=><option key={k} value={k}>{v}</option>)}
      </select>
      <input type="date" value={item.startDate} onChange={e=>onUpdate({...item,startDate:e.target.value})} style={IS}/>
      <button onClick={onDelete} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:6,cursor:"pointer",width:34,height:34,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    </div>
  );
}

function Section({title,color,onAdd,children}){
  const rgb = color==="#34d399"?"52,211,153":"248,113,113";
  return(
    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"22px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:"#e2e8f0"}}>{title}</span>
        </div>
        <button onClick={onAdd} style={{background:`rgba(${rgb},0.1)`,border:`1px solid rgba(${rgb},0.25)`,color,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>+ Add</button>
      </div>
      {children}
    </div>
  );
}

function App(){
  const {useState,useMemo,useEffect,useRef} = React;
  const [income,  setIncome]   = useState(defaultIncome);
  const [expenses,setExpenses] = useState(defaultExpenses);
  const months = useMemo(()=>getMonths(12),[]);
  const [startBal,  setStartBal]  = useState(5000);
  const [activeTab, setActiveTab] = useState("planner");
  const [accessToken,setAccessToken] = useState(()=>localStorage.getItem("teller_token")||null);
  const [transactions,setTransactions] = useState([]);
  const [loadingTx,  setLoadingTx]    = useState(false);
  const [txError,    setTxError]      = useState(null);
  const tcRef = useRef(null);

  // Init Teller Connect once script is ready
  useEffect(()=>{
    function init(){
      if(window.TellerConnect){
        tcRef.current = window.TellerConnect.setup({
          applicationId: TELLER_APP_ID,
          products: ["transactions"],
          environment: "development",
          onSuccess: enrollment => {
            const token = enrollment.accessToken;
            localStorage.setItem("teller_token", token);
            setAccessToken(token);
          },
          onExit: ()=>{},
        });
      }
    }
    if(window.TellerConnect) init();
    else {
      const script = document.querySelector('script[src*="teller.io"]');
      if(script) script.addEventListener("load", init);
    }
  },[]);

  useEffect(()=>{
    if(accessToken) fetchTx(accessToken);
  },[accessToken]);

  async function fetchTx(token){
    setLoadingTx(true); setTxError(null);
    try{
      const res  = await fetch(`${BACKEND_URL}/transactions?accessToken=${token}`);
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      setTransactions(data);
    }catch(e){ setTxError(e.message); }
    finally{ setLoadingTx(false); }
  }

  function openConnect(){
    if(tcRef.current) tcRef.current.open();
    else alert("Teller Connect is still loading, try again in a moment.");
  }

  function disconnect(){
    localStorage.removeItem("teller_token");
    setAccessToken(null); setTransactions([]);
  }

  const projection = useMemo(()=>{
    let bal = startBal;
    return months.map(({label,month,year})=>{
      const totalIn  = income.reduce((s,i)=>s+amtForMonth(i,month,year),0);
      const totalOut = expenses.reduce((s,e)=>s+amtForMonth(e,month,year),0);
      const net = totalIn-totalOut;
      bal += net;
      return {label,totalIn,totalOut,net,balance:bal};
    });
  },[income,expenses,months,startBal]);

  const actualNow = useMemo(()=>{
    const tx = transactions.filter(t=>{ const d=new Date(t.date); return d.getMonth()===CM&&d.getFullYear()===CY; });
    const inc = tx.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
    const exp = tx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
    return {income:inc,expenses:exp,net:inc-exp};
  },[transactions]);

  const maxBal = Math.max(...projection.map(p=>p.balance),startBal);
  const minBal = Math.min(...projection.map(p=>p.balance),0);
  const range  = maxBal-minBal||1;

  const colH = ["Description","Category","Amount","Frequency","Start Date",""];

  const tabBtn = (v,label,badge)=>(
    <button key={v} onClick={()=>setActiveTab(v)} style={{
      background:activeTab===v?"rgba(99,179,237,0.15)":"rgba(255,255,255,0.04)",
      border:activeTab===v?"1px solid rgba(99,179,237,0.4)":"1px solid rgba(255,255,255,0.08)",
      color:activeTab===v?"#63b3ed":"#64748b",
      borderRadius:8,padding:"7px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit"
    }}>
      {label}{badge>0&&<span style={{background:"rgba(99,179,237,0.2)",borderRadius:10,padding:"1px 7px",fontSize:11,marginLeft:6}}>{badge}</span>}
    </button>
  );

  return(
    <div style={{minHeight:"100vh",padding:"32px 24px"}}>
      <div style={{maxWidth:1140,margin:"0 auto"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:28,flexWrap:"wrap",gap:16}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>Cash Flow Planner</div>
            <div style={{color:"#64748b",fontSize:13,marginTop:4}}>12-month projection + live bank data</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            {!accessToken?(
              <button onClick={openConnect} style={{background:"rgba(99,179,237,0.15)",border:"1px solid rgba(99,179,237,0.35)",color:"#63b3ed",borderRadius:10,padding:"9px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}>
                🏦 Connect Bank
              </button>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:10,padding:"9px 14px"}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:"#34d399"}}/>
                  <span style={{color:"#34d399",fontSize:12}}>Bank Connected</span>
                  {loadingTx&&<span style={{color:"#64748b",fontSize:11,marginLeft:4}}>syncing…</span>}
                </div>
                <button onClick={()=>fetchTx(accessToken)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#94a3b8",borderRadius:8,padding:"9px 12px",cursor:"pointer",fontSize:14,fontFamily:"inherit"}} title="Refresh">↻</button>
                <button onClick={disconnect} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",color:"#f87171",borderRadius:8,padding:"9px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Disconnect</button>
              </div>
            )}
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:"#64748b",fontSize:13}}>Starting balance</span>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",pointerEvents:"none"}}>$</span>
                <input type="number" value={startBal} onChange={e=>setStartBal(parseFloat(e.target.value)||0)} style={{...IS,paddingLeft:24,width:130,fontSize:15}}/>
              </div>
            </div>
          </div>
        </div>

        {txError&&(
          <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"12px 16px",marginBottom:20,color:"#f87171",fontSize:13}}>
            ⚠️ Bank sync error: {txError}
          </div>
        )}

        {/* Summary Cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
          {[
            {label:"Avg Monthly Income",  value:fmt(projection.reduce((s,p)=>s+p.totalIn,0)/12),  color:"#34d399"},
            {label:"Avg Monthly Expenses",value:fmt(projection.reduce((s,p)=>s+p.totalOut,0)/12), color:"#f87171"},
            {label:"Avg Net / Month",     value:fmt(projection.reduce((s,p)=>s+p.net,0)/12),       color:projection.reduce((s,p)=>s+p.net,0)/12>=0?"#60a5fa":"#f87171"},
            {label:"Projected (12 mo)",   value:fmt(projection[11]?.balance??0),                   color:(projection[11]?.balance??0)>=0?"#a78bfa":"#f87171"},
          ].map(c=>(
            <div key={c.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"18px 20px"}}>
              <div style={{color:"#64748b",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>{c.label}</div>
              <div style={{fontSize:22,fontWeight:500,color:c.color}}>{c.value}</div>
            </div>
          ))}
        </div>

        {/* Actual vs Projected (this month) */}
        {accessToken&&transactions.length>0&&(
          <div style={{background:"rgba(99,179,237,0.05)",border:"1px solid rgba(99,179,237,0.15)",borderRadius:14,padding:"20px 24px",marginBottom:28}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:"#e2e8f0",marginBottom:16}}>This Month — Actual vs Projected</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
              {[
                {label:"Income",  actual:actualNow.income,   projected:projection[0]?.totalIn,  color:"#34d399"},
                {label:"Expenses",actual:actualNow.expenses,  projected:projection[0]?.totalOut, color:"#f87171"},
                {label:"Net",     actual:actualNow.net,       projected:projection[0]?.net,      color:"#60a5fa"},
              ].map(row=>{
                const diff = row.actual-row.projected;
                return(
                  <div key={row.label} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"14px 16px"}}>
                    <div style={{color:"#64748b",fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>{row.label}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                      <div>
                        <div style={{color:"#64748b",fontSize:10,marginBottom:2}}>Actual</div>
                        <div style={{color:row.color,fontSize:18,fontWeight:500}}>{fmt(row.actual)}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"#64748b",fontSize:10,marginBottom:2}}>Projected</div>
                        <div style={{color:"#475569",fontSize:18}}>{fmt(row.projected)}</div>
                      </div>
                    </div>
                    <div style={{marginTop:10,fontSize:12,color:diff>=0?"#34d399":"#f87171"}}>
                      {diff>=0?"▲":"▼"} {fmt(Math.abs(diff))} {diff>=0?"ahead":"behind"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Tabs */}
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {tabBtn("planner","Planner",0)}
          {tabBtn("actual","Transactions",transactions.length)}
          {tabBtn("chart","Chart",0)}
        </div>

        {/* Planner Tab */}
        {activeTab==="planner"&&(
          <>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,overflow:"auto",marginBottom:24}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                    {["Month","Income","Expenses","Net","Running Balance"].map(h=>(
                      <th key={h} style={{padding:"14px 18px",textAlign:"left",color:"#475569",fontWeight:500,fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {projection.map((row,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)"}}>
                      <td style={{padding:"13px 18px",color:"#94a3b8"}}>{row.label}</td>
                      <td style={{padding:"13px 18px",color:"#34d399"}}>{fmt(row.totalIn)}</td>
                      <td style={{padding:"13px 18px",color:"#f87171"}}>{fmt(row.totalOut)}</td>
                      <td style={{padding:"13px 18px",color:row.net>=0?"#60a5fa":"#f87171",fontWeight:500}}>{row.net>=0?"+":""}{fmt(row.net)}</td>
                      <td style={{padding:"13px 18px",color:row.balance>=0?"#e2e8f0":"#f87171",fontWeight:500}}>{fmt(row.balance)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <Section title="Income Streams" color="#34d399" onAdd={()=>setIncome(p=>[...p,{id:NID++,label:"",category:CAT_IN[0],amount:0,frequency:"monthly",startDate:startOfMonth()}])}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 140px 110px 120px 140px 34px",gap:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.08)",marginBottom:4}}>
                {colH.map(h=><div key={h} style={{color:"#475569",fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</div>)}
              </div>
              {income.map(item=><ItemRow key={item.id} item={item} cats={CAT_IN} onUpdate={u=>setIncome(p=>p.map(i=>i.id===u.id?u:i))} onDelete={()=>setIncome(p=>p.filter(i=>i.id!==item.id))}/>)}
            </Section>
            <div style={{height:20}}/>
            <Section title="Expenses" color="#f87171" onAdd={()=>setExpenses(p=>[...p,{id:NID++,label:"",category:CAT_OUT[0],amount:0,frequency:"monthly",startDate:startOfMonth()}])}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 140px 110px 120px 140px 34px",gap:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.08)",marginBottom:4}}>
                {colH.map(h=><div key={h} style={{color:"#475569",fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</div>)}
              </div>
              {expenses.map(item=><ItemRow key={item.id} item={item} cats={CAT_OUT} onUpdate={u=>setExpenses(p=>p.map(i=>i.id===u.id?u:i))} onDelete={()=>setExpenses(p=>p.filter(i=>i.id!==item.id))}/>)}
            </Section>
          </>
        )}

        {/* Transactions Tab */}
        {activeTab==="actual"&&(
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,overflow:"auto"}}>
            {!accessToken?(
              <div style={{padding:48,textAlign:"center",color:"#475569"}}>
                <div style={{fontSize:32,marginBottom:12}}>🏦</div>
                <div style={{fontSize:15,marginBottom:8,color:"#64748b"}}>No bank connected</div>
                <div style={{fontSize:13}}>Click "Connect Bank" above to link your accounts</div>
              </div>
            ):loadingTx?(
              <div style={{padding:48,textAlign:"center",color:"#475569",fontSize:13}}>Loading transactions…</div>
            ):transactions.length===0?(
              <div style={{padding:48,textAlign:"center",color:"#475569",fontSize:13}}>No transactions found</div>
            ):(
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                    {["Date","Description","Category","Account","Amount"].map(h=>(
                      <th key={h} style={{padding:"14px 18px",textAlign:"left",color:"#475569",fontWeight:500,fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {transactions.map((tx,i)=>(
                    <tr key={tx.id||i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)"}}>
                      <td style={{padding:"12px 18px",color:"#64748b"}}>{tx.date}</td>
                      <td style={{padding:"12px 18px",color:"#94a3b8",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.description}</td>
                      <td style={{padding:"12px 18px"}}>
                        <span style={{background:"rgba(255,255,255,0.06)",borderRadius:6,padding:"3px 9px",fontSize:11,color:"#94a3b8"}}>{tx.category}</span>
                      </td>
                      <td style={{padding:"12px 18px",color:"#475569",fontSize:12}}>{tx.accountName}</td>
                      <td style={{padding:"12px 18px",color:tx.amount>0?"#34d399":"#f87171",fontWeight:500}}>
                        {tx.amount>0?"+":""}{fmt(tx.amount)}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        )}

        {/* Chart Tab */}
        {activeTab==="chart"&&(
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"24px 20px"}}>
            <div style={{color:"#64748b",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:20}}>Projected Running Balance</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:200}}>
              {projection.map((row,i)=>{
                const h   = Math.max(4,((row.balance-minBal)/range)*180);
                const neg = row.balance<0;
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                    <div style={{fontSize:10,color:neg?"#f87171":"#94a3b8",whiteSpace:"nowrap"}}>{fmt(row.balance)}</div>
                    <div style={{width:"100%",height:h,background:neg?"rgba(248,113,113,0.4)":"rgba(99,179,237,0.35)",borderRadius:"4px 4px 0 0",border:neg?"1px solid rgba(248,113,113,0.5)":"1px solid rgba(99,179,237,0.4)"}}/>
                    <div style={{fontSize:10,color:"#475569",whiteSpace:"nowrap"}}>{row.label.split(" ")[0]}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
