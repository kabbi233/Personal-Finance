<script type="text/babel">
const TELLER_APP_ID = "app_pq1oddda2fceiqaqk6000";
const BACKEND_URL   = "";

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const today = new Date();
const CM = today.getMonth();
const CY = today.getFullYear();

function pad(n){ return String(n).padStart(2,"0"); }
function startOfMonth(offset=0){
  const d = new Date(CY, CM+offset, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;
}
function getMonths(n){
  return Array.from({length:n},(_,i)=>{
    const d = new Date(CY,CM+i,1);
    return {label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,month:d.getMonth(),year:d.getFullYear()};
  });
}
function amtForMonth(item,month,year){
  const start = new Date(item.startDate);
  if(start.getFullYear()>year||(start.getFullYear()===year&&start.getMonth()>month)) return 0;
  if(item.frequency==="once") return start.getMonth()===month&&start.getFullYear()===year?item.amount:0;
  if(item.frequency==="weekly") return item.amount*4.33;
  if(item.frequency==="biweekly") return item.amount*2.17;
  return item.amount;
}
function fmt(n){ return "$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtSigned(n){ return (n>0?"+":"")+(n<0?"-":"")+"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }

const CAT_IN  = ["Ivory Maids","Detailing","AI/Reactivation","W-2 Job","Other Income"];
const CAT_OUT = ["Supplies","Marketing","Software","Rent/Utilities","Personal","Taxes","Payroll","Other Expense"];
const LOCKED_CATS = ["Savings"];
const FREQ    = {once:"One-time",weekly:"Weekly",biweekly:"Biweekly",monthly:"Monthly"};

const IS = {
  background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
  borderRadius:8,color:"#e2e8f0",padding:"7px 10px",fontSize:13,

function uid(){ return Date.now() + Math.floor(Math.random()*100000); }

  {id:2,label:"W-2 Paycheck",category:"W-2 Job",amount:800,frequency:"biweekly",startDate:startOfMonth()},

  {id:2,label:"Google Ads",category:"Marketing",amount:350,frequency:"monthly",startDate:startOfMonth()},

const ACCT_COLORS = ["#60a5fa","#34d399","#a78bfa","#f59e0b","#f472b6","#38bdf8","#fb923c","#4ade80"];

  "#818cf8","#60a5fa","#34d399","#f59e0b","#f87171","#e879f9","#a78bfa","#38bdf8","#fb923c","#4ade80","#f472b6","#facc15"
];



function AnimNum({value, prefix="$", decimals=2}){
  const {useState,useEffect,useRef} = React;
  const [display, setDisplay] = useState(0);
  const prev = useRef(0);
  useEffect(()=>{
    const start = prev.current;
    const end = value;
    prev.current = end;
    if(start===end) return;
    const dur = 600;
    const startTime = performance.now();
    function step(now){
      const p = Math.min((now-startTime)/dur,1);
      const ease = 1-Math.pow(1-p,3);
      setDisplay(start + (end-start)*ease);
      if(p<1) requestAnimationFrame(step);
      else setDisplay(end);
    }
    requestAnimationFrame(step);
  },[value]);
  const abs = Math.abs(display);
  const str = prefix + abs.toLocaleString("en-US",{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  return <span>{str}</span>;
}

function CatDropdown({value, options, onChange, onClose}){
  const {useState,useEffect,useRef} = React;
  const ref = useRef(null);
  useEffect(()=>{
    function handler(e){
      if(ref.current && !ref.current.contains(e.target)) onClose();
    }
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[onClose]);
  return(
    <div ref={ref} style={{position:"relative",display:"inline-block",zIndex:1000}}>
      <div style={{background:"#1e293b",border:"1px solid rgba(99,179,237,0.4)",borderRadius:6,minWidth:160,maxHeight:220,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
        {options.map(opt=>(
          <div key={opt} onMouseDown={e=>{ e.preventDefault(); onChange(opt); }}
            style={{padding:"7px 12px",fontSize:12,color:opt===value?"#63b3ed":"#94a3b8",background:opt===value?"rgba(99,179,237,0.1)":"transparent",cursor:"pointer",fontFamily:"'DM Mono','Courier New',monospace"}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,0.06)"}
            onMouseOut={e=>e.currentTarget.style.background=opt===value?"rgba(99,179,237,0.1)":"transparent"}>
            {opt}
          </div>
        ))}
      </div>
    </div>
  );
}

function ItemRow({item,onUpdate,onDelete,cats}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 140px 110px 120px 140px 34px",gap:8,alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
      <input value={item.label} onChange={e=>onUpdate({...item,label:e.target.value})} placeholder="Description" style={IS}/>

        <input type="number" value={item.amount} onChange={e=>onUpdate({...item,amount:parseFloat(e.target.value)||0})} style={{...IS,paddingLeft:22}}/>
      </div>
      <select value={item.frequency} onChange={e=>onUpdate({...item,frequency:e.target.value})} style={SS}>
        {Object.entries(FREQ).map(([k,v])=><option key={k} value={k}>{v}</option>)}
      </select>
      <input type="date" value={item.startDate} onChange={e=>onUpdate({...item,startDate:e.target.value})} style={IS}/>
      <button onClick={onDelete} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:6,cursor:"pointer",width:34,height:34,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    </div>
  );
}

function Section({title,color,onAdd,children}){

          <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:"#e2e8f0"}}>{title}</span>
        </div>
        <button onClick={onAdd} style={{background:`rgba(${rgb},0.1)`,border:`1px solid rgba(${rgb},0.25)`,color,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>+ Add</button>
      </div>
      {children}
    </div>
  );
}

function App(){
  const {useState,useMemo,useEffect,useRef} = React;
  const [income,   setIncome]   = useState(loadIncome);
  const [expenses, setExpenses] = useState(loadExpenses);
  const months = useMemo(()=>getMonths(12),[]);
  const [activeTab,   setActiveTab]   = useState("planner");
  const [datePreset,  setDatePreset]  = useState("all");
  const [dateFrom,    setDateFrom]    = useState("");
  const [dateTo,      setDateTo]      = useState("");
  const [statusFilter,setStatusFilter]= useState("all");
  const [editingCat,  setEditingCat]  = useState(null);
  const [drilldown,    setDrilldown]    = useState(null);
  const [search,       setSearch]       = useState("");
  const [groupByAcct,  setGroupByAcct]  = useState(false);
  const [budgets,      setBudgets]      = useState(()=>{ try{ return JSON.parse(localStorage.getItem("budgets")||"{}"); }catch{ return {}; } });
  const [editBudget,   setEditBudget]   = useState(null);
  const [catDrillCat,  setCatDrillCat]  = useState(null);
  const [merchantRules, setMerchantRules] = useState(()=>{ try{ return JSON.parse(localStorage.getItem("merchant_rules")||"{}"); }catch{ return {}; } });
  const [rulePrompt,    setRulePrompt]    = useState(null); // {txId, keyword, category}
  const [ruleTestInput, setRuleTestInput] = useState("");

  function cleanKeyword(desc){
    return (desc||"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim().split(" ").slice(0,3).join(" ");
  }

  function applyRulesToTx(txList, rules){
    return txList.map(tx=>{
      const desc = (tx.description||"").toLowerCase();
      for(const [kw, cat] of Object.entries(rules)){
        if(desc.includes(kw)) return {...tx, category:cat, autoTagged:kw};
      }
      return tx;
    });
  }

  function saveRule(keyword, category){
    const next = {...merchantRules, [keyword.toLowerCase().trim()]: category};
    setMerchantRules(next);
    localStorage.setItem("merchant_rules", JSON.stringify(next));
    setTransactions(prev => applyRulesToTx(prev, next));
    setRulePrompt(null);
  }

  function deleteRule(keyword){
    const next = {...merchantRules};
    delete next[keyword];
    setMerchantRules(next);
    localStorage.setItem("merchant_rules", JSON.stringify(next));
    setTransactions(prev => applyRulesToTx(prev, next));
  }

  function saveBudget(cat, val){
    const next = {...budgets, [cat]: parseFloat(val)||0};
    setBudgets(next);
    localStorage.setItem("budgets", JSON.stringify(next));
    setEditBudget(null);
  }
  const [catOverrides,setCatOverrides]= useState(()=>{
    try{ return JSON.parse(localStorage.getItem("cat_overrides")||"{}"); }catch{ return {}; }
  });
  const [customCatsIn,  setCustomCatsIn]  = useState(()=>{ try{ const s=localStorage.getItem("custom_cats_in");  return s?JSON.parse(s):[]; }catch{ return []; } });
  const [customCatsOut, setCustomCatsOut] = useState(()=>{ try{ const s=localStorage.getItem("custom_cats_out"); return s?JSON.parse(s):[]; }catch{ return []; } });
  const [newCatName,    setNewCatName]    = useState("");
  const [newCatType,    setNewCatType]    = useState("expense");
  const [hiddenCatsIn,  setHiddenCatsIn]  = useState(()=>{ try{ return JSON.parse(localStorage.getItem("hidden_cats_in")||"[]"); }catch{ return []; } });
  const [hiddenCatsOut, setHiddenCatsOut] = useState(()=>{ try{ return JSON.parse(localStorage.getItem("hidden_cats_out")||"[]"); }catch{ return []; } });
  const allCatsIn  = useMemo(()=>[...CAT_IN.filter(c=>!hiddenCatsIn.includes(c)),  ...customCatsIn],  [customCatsIn,  hiddenCatsIn]);
  const allCatsOut = useMemo(()=>[...CAT_OUT.filter(c=>!hiddenCatsOut.includes(c)), ...customCatsOut, ...LOCKED_CATS], [customCatsOut, hiddenCatsOut]);

  function addCustomCat(){
    if(!newCatName.trim()) return;
    if(newCatType==="income"){
      const next=[...customCatsIn, newCatName.trim()];
      setCustomCatsIn(next); localStorage.setItem("custom_cats_in", JSON.stringify(next));
    } else {
      const next=[...customCatsOut, newCatName.trim()];
      setCustomCatsOut(next); localStorage.setItem("custom_cats_out", JSON.stringify(next));
    }
    setNewCatName("");
  }
  function deleteCustomCat(name, type){
    if(LOCKED_CATS.includes(name)) return;
    if(type==="income"){
      const nextCustom = customCatsIn.filter(c=>c!==name);
      setCustomCatsIn(nextCustom);
      localStorage.setItem("custom_cats_in", JSON.stringify(nextCustom));
      if(CAT_IN.includes(name)){
        const next=[...hiddenCatsIn, name];
        setHiddenCatsIn(next);
        localStorage.setItem("hidden_cats_in", JSON.stringify(next));
      }
    } else {
      const nextCustom = customCatsOut.filter(c=>c!==name);
      setCustomCatsOut(nextCustom);
      localStorage.setItem("custom_cats_out", JSON.stringify(nextCustom));
      if(CAT_OUT.includes(name)){
        const next=[...hiddenCatsOut, name];
        setHiddenCatsOut(next);
        localStorage.setItem("hidden_cats_out", JSON.stringify(next));
      }
    }
  }

  // Multi-account state
  // enrollments: [{token, label}]  accountMeta: {accountId: {balance, name, type, institution, lastFour}}
  // excluded: Set of accountIds
  const [enrollments, setEnrollments] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem("enrollments")||"[]"); }catch{ return []; }
  });
  const [accountMeta,  setAccountMeta]  = useState({});
  const [excluded,     setExcluded]     = useState(()=>{
    try{ return new Set(JSON.parse(localStorage.getItem("excluded_accounts")||"[]")); }catch{ return new Set(); }
  });
  const [transactions, setTransactions] = useState([]);
  const [loadingTx,    setLoadingTx]    = useState(false);
  const [txError,      setTxError]      = useState(null);
  const [loadingBal,   setLoadingBal]   = useState(false);
  const [lastSync,      setLastSync]      = useState(null);
  const [accountNames,  setAccountNames]  = useState(()=>{ try{ return JSON.parse(localStorage.getItem("account_names")||"{}"); }catch{ return {}; } });
  const [editAcctName,  setEditAcctName]  = useState(null);

  function saveAcctName(id, name){
    const next = {...accountNames, [id]: name.trim()||accountMeta[id]?.accountName||id};
    setAccountNames(next);
    localStorage.setItem("account_names", JSON.stringify(next));
    setEditAcctName(null);
  }
  function getAcctName(id, fallback){ return accountNames[id]||fallback; }
  const tcRef = useRef(null);

  // Derived: starting balance = sum of included account balances
  const startBal = useMemo(()=>{
    return Object.entries(accountMeta)
      .filter(([id])=>!excluded.has(id))
      .reduce((s,[,m])=>s+(m.available||0),0);
  },[accountMeta,excluded]);

  const acctColorMap = useMemo(()=>{
    const ids = Object.keys(accountMeta);
    const map = {};
    ids.forEach((id,i)=>{ map[id]=ACCT_COLORS[i%ACCT_COLORS.length]; });
    return map;
  },[accountMeta]);

  function saveEnrollments(list){
    setEnrollments(list);
    localStorage.setItem("enrollments", JSON.stringify(list));
  }
  function saveExcluded(set){
    setExcluded(new Set(set));
    localStorage.setItem("excluded_accounts", JSON.stringify([...set]));
  }

  function overrideCat(txId, newCat){
    const updated = {...catOverrides, [txId]: newCat};
    setCatOverrides(updated);
    localStorage.setItem("cat_overrides", JSON.stringify(updated));
    setEditingCat(null);
    setTransactions(prev => prev.map(t => t.id===txId ? {...t, category:newCat} : t));
    const tx = transactions.find(t=>t.id===txId);
    if(tx){
      const kw = cleanKeyword(tx.description);
      setRulePrompt({txId, keyword:kw, category:newCat, description:tx.description});
    }
  }

  // Init Teller Connect
  useEffect(()=>{
    function init(){
      if(window.TellerConnect){
        tcRef.current = window.TellerConnect.setup({
          applicationId: TELLER_APP_ID,
          products: ["transactions","balance"],
          environment: "development",
          onSuccess: enrollment => {
            const token = enrollment.accessToken;
            const newList = [...enrollments, {token, label:""}];
            saveEnrollments(newList);
            fetchAllData(newList);
          },
          onExit: ()=>{},
        });
      }
    }
    if(window.TellerConnect) init();
    else{
      const script = document.querySelector('script[src*="teller.io"]');
      if(script) script.addEventListener("load", init);
    }
  },[enrollments]);

  // On load, fetch data for all stored enrollments
  useEffect(()=>{
    if(enrollments.length>0) fetchAllData(enrollments);
  },[]);

  async function fetchAllData(list){
    setLoadingTx(true); setLoadingBal(true); setTxError(null);
    try{
      const allTx = [];
      const newMeta = {};
      for(const {token} of list){
        // fetch balances
        try{
          const bRes  = await fetch(`${BACKEND_URL}/balances?accessToken=${token}`);
          const bData = await bRes.json();
          if(Array.isArray(bData)) bData.forEach(b=>{ newMeta[b.accountId]=b; });
        }catch(_){}
        // fetch transactions
        try{
          const tRes  = await fetch(`${BACKEND_URL}/transactions?accessToken=${token}`);
          const tData = await tRes.json();
          if(Array.isArray(tData)) allTx.push(...tData);
        }catch(_){}
      }
      setAccountMeta(newMeta);
      allTx.sort((a,b)=>new Date(b.date)-new Date(a.date));
      setTransactions(applyRulesToTx(allTx, merchantRules));
      setLastSync(new Date());
    }catch(e){ setTxError(e.message); }
    finally{ setLoadingTx(false); setLoadingBal(false); }
  }

  function openConnect(){
    if(tcRef.current) tcRef.current.open();
    else alert("Teller Connect is still loading, try again in a moment.");
  }

  function removeEnrollment(token){
    const newList = enrollments.filter(e=>e.token!==token);
    saveEnrollments(newList);
    fetchAllData(newList);
  }

  function toggleExclude(accountId){
    const next = new Set(excluded);
    if(next.has(accountId)) next.delete(accountId); else next.add(accountId);
    saveExcluded(next);
  }

  // Filtered transactions (only included accounts)
  const includedTx = useMemo(()=>transactions.filter(t=>!excluded.has(t.accountId)),[transactions,excluded]);

  const projection = useMemo(()=>{
    let bal = startBal;
    let sav = 0;
    return months.map(({label,month,year})=>{
      const totalIn  = income.reduce((s,i)=>s+amtForMonth(i,month,year),0);
      const totalOut = expenses.reduce((s,e)=>s+amtForMonth(e,month,year),0);
      const savingsAmt = expenses.filter(e=>e.category==="Savings").reduce((s,e)=>s+amtForMonth(e,month,year),0);
      const net = totalIn-totalOut;
      bal += net;
      sav += savingsAmt;
      return {label,totalIn,totalOut,net,balance:bal,savings:sav};
    });
  },[income,expenses,months,startBal]);

  const actualNow = useMemo(()=>{
    const tx = includedTx.filter(t=>{ const d=new Date(t.date); return d.getMonth()===CM&&d.getFullYear()===CY; });
    const inc = tx.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
    const exp = tx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
    return {income:inc,expenses:exp,net:inc-exp};
  },[includedTx]);

  const maxBal = Math.max(...projection.map(p=>p.balance),startBal);
  const minBal = Math.min(...projection.map(p=>p.balance),0);
  const range  = maxBal-minBal||1;

  const colH = ["Description","Category","Amount","Frequency","Start Date",""];

  const tabBtn = (v,label,badge)=>(
    <button key={v} onClick={()=>setActiveTab(v)} style={{
      background:activeTab===v?"rgba(99,179,237,0.15)":"rgba(255,255,255,0.04)",
      border:activeTab===v?"1px solid rgba(99,179,237,0.4)":"1px solid rgba(255,255,255,0.08)",
      color:activeTab===v?"#63b3ed":"#64748b",
      borderRadius:8,padding:"7px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit"
    }}>
      {label}{badge>0&&<span style={{background:"rgba(99,179,237,0.2)",borderRadius:10,padding:"1px 7px",fontSize:11,marginLeft:6}}>{badge}</span>}
    </button>
  );

  return(
    <div style={{minHeight:"100vh",padding:"32px 24px"}}>
      <div style={{maxWidth:1140,margin:"0 auto"}}>

        {/* Header */}

                              <span style={{fontSize:11,color:"#475569",background:"rgba(255,255,255,0.05)",borderRadius:5,padding:"2px 8px"}}>locked</span>
                            ):(
                              <button onClick={()=>deleteCustomCat(cat,"expense")} style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",color:"#f87171",borderRadius:5,padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14}}>
                    <input value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomCat()} placeholder="New category name…" style={{...IS,flex:1,fontSize:13}}/>
                    <select value={newCatType} onChange={e=>setNewCatType(e.target.value)} style={{...SS,width:120,fontSize:13}}>
                      <option value="income">Income</option>
                      <option value="expense">Expense</option>
                    </select>
                    <button onClick={addCustomCat} style={{background:"rgba(99,179,237,0.15)",border:"1px solid rgba(99,179,237,0.35)",color:"#63b3ed",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontSize:13,fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Add</button>
                  </div>
                </div>

              </div>
            );
          })()
        </div>)}

        {/* Accounts Tab */}
        {activeTab==="accounts"&&(<div className="tab-content">
          <div>
            {Object.keys(accountMeta).length===0?(
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:48,textAlign:"center",color:"#475569"}}>
                <div style={{fontSize:32,marginBottom:12}}>🏦</div>
                <div style={{fontSize:15,marginBottom:8,color:"#64748b"}}>No accounts connected</div>
                <div style={{fontSize:13}}>Click "+ Connect Bank" to link your first account</div>
              </div>
            ):(
              <>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
                  {[
                    {label:"Total Balance", value:fmt(Object.values(accountMeta).reduce((s,m)=>s+(m.available||0),0)), sub:`across ${Object.keys(accountMeta).length} account${Object.keys(accountMeta).length!==1?"s":""}`, color:"#e2e8f0"},
                    {label:"Included in Projection", value:fmt(startBal), sub:`${Object.keys(accountMeta).filter(id=>!excluded.has(id)).length} of ${Object.keys(accountMeta).length} accounts`, color:"#60a5fa"},
                    {label:"Last Synced", value:lastSync?lastSync.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—", sub:"click ↻ to refresh", color:"#94a3b8"},
                  ].map(c=>(
                    <div key={c.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"16px 20px"}}>
                      <div style={{color:"#64748b",fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{c.label}</div>
                      <div style={{fontSize:20,fontWeight:500,color:c.color}}>{c.value}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:4}}>{c.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {Object.entries(accountMeta).map(([id,meta])=>{
                    const isExcluded = excluded.has(id);
                    return(
                      <div key={id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isExcluded?"rgba(255,255,255,0.07)":"rgba(52,211,153,0.2)"}`,borderRadius:12,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",opacity:isExcluded?0.65:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:14}}>
                          <div style={{width:38,height:38,borderRadius:10,background:isExcluded?"rgba(255,255,255,0.05)":"rgba(52,211,153,0.1)",border:`1px solid ${isExcluded?"rgba(255,255,255,0.1)":"rgba(52,211,153,0.2)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏦</div>
                          <div>
                            {editAcctName===id?(
                              <input autoFocus defaultValue={getAcctName(id,meta.accountName||"")}
                                onBlur={e=>saveAcctName(id,e.target.value)}
                                onKeyDown={e=>{ if(e.key==="Enter") saveAcctName(id,e.target.value); if(e.key==="Escape") setEditAcctName(null); }}
                                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(99,179,237,0.4)",borderRadius:6,color:"#63b3ed",padding:"3px 10px",fontSize:14,fontFamily:"inherit",outline:"none",width:200}}/>
                            ):(
                              <div onClick={()=>setEditAcctName(id)} style={{fontSize:14,fontWeight:500,color:isExcluded?"#94a3b8":"#e2e8f0",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                                {getAcctName(id,meta.accountName)} <span style={{fontSize:10,color:"#475569"}}>✎</span>
                              </div>
                            )}
                            <div style={{fontSize:11,color:"#475569",marginTop:2}}>{meta.institution}{meta.lastFour?` · ••••${meta.lastFour}`:""}</div>
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:20}}>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:15,fontWeight:500,color:isExcluded?"#64748b":"#60a5fa"}}>{fmt(meta.available||0)}</div>
                            <div style={{fontSize:11,color:"#475569"}}>{meta.subtype||meta.type||"account"}</div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>toggleExclude(id)}>
                            <span style={{fontSize:11,color:isExcluded?"#64748b":"#34d399"}}>{isExcluded?"Excluded":"Included"}</span>
                            <div style={{width:36,height:20,background:isExcluded?"rgba(255,255,255,0.1)":"#34d399",borderRadius:10,position:"relative",transition:"background 0.2s"}}>
                              <div style={{width:16,height:16,background:isExcluded?"#475569":"white",borderRadius:"50%",position:"absolute",top:2,left:isExcluded?2:18,transition:"left 0.2s"}}/>
                            </div>
                          </div>
                          <button onClick={()=>{
                            const enrollment = enrollments.find(e=>{
                              return true;
                            });
                            const newList = enrollments.filter((_,i)=>i!==0);
                            if(enrollments.length===1) saveEnrollments([]);
                          }} style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",color:"#f87171",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>)}
        {/* Chart Tab */}
        {activeTab==="chart"&&(<div className="tab-content">
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"24px 20px"}}>
            <div style={{color:"#64748b",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:20}}>Projected Running Balance</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:200}}>
              {projection.map((row,i)=>{
                const h   = Math.max(4,((row.balance-minBal)/range)*180);
                const neg = row.balance<0;
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                    <div style={{fontSize:10,color:neg?"#f87171":"#94a3b8",whiteSpace:"nowrap"}}>{fmt(row.balance)}</div>
                    <div style={{width:"100%",height:h,background:neg?"rgba(248,113,113,0.4)":"rgba(99,179,237,0.35)",borderRadius:"4px 4px 0 0",border:neg?"1px solid rgba(248,113,113,0.5)":"1px solid rgba(99,179,237,0.4)"}}/>
                    <div style={{fontSize:10,color:"#475569",whiteSpace:"nowrap"}}>{row.label.split(" ")[0]}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>)}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
